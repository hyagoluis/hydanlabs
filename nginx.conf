# ============================================================
# Hydan-Labs - Configuração do Nginx
# Serve o site estático + (opcional) reverse proxy do OpenWebUI
# ============================================================

server {
    # Escuta na porta 80 (IPv4 + IPv6)
    listen 80;
    listen [::]:80;

    # 👉 Troque pelo seu domínio, ou deixe "_" para acessar via IP
    server_name _;

    # Caminho dos arquivos do site
    root /var/www/hydan-labs;
    index index.html;

    # Tamanho máximo de upload (importante para o OpenWebUI enviar PDFs)
    client_max_body_size 100M;

    # Compressão Gzip (deixa o site mais rápido)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript image/svg+xml;

    # Cache de arquivos estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ============================================================
    # SITE PRINCIPAL (Hydan-Labs)
    # ============================================================
    location / {
        try_files $uri $uri/ =404;
    }

    # ============================================================
    # STATUS BADGE — Verifica se o Ollama está online
    # O JavaScript faz fetch('/status') para mostrar o status
    # ============================================================
    location = /status {
        proxy_pass http://127.0.0.1:11434/api/tags;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 3s;
        proxy_read_timeout 3s;
        access_log off;
    }

    # ============================================================
    # MONITORAMENTO + AUTH — Backend Flask (auth + métricas)
    # Substitui o antigo :8080. Agora /api/ vai para :8081 (com auth)
    # ============================================================
    location /api/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_read_timeout 10s;
        access_log off;
    }

    # ============================================================
    # AUTH — Login, logout, gestão de usuários
    # ============================================================
    location /auth/ {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_read_timeout 10s;
        access_log off;
    }

    # ============================================================
    # OPENWEBUI — Acessado direto pela porta 3000 (não em /chat)
    # O OpenWebUI não suporta subpath sem configuração extra.
    # ============================================================
    # location /chat/ {
    #     proxy_pass http://127.0.0.1:3000/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_read_timeout 86400;
    # }

    # ============================================================
    # WEBHOOK — Auto-deploy via GitHub
    # ============================================================
    location = /webhook/deploy {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # ============================================================
    # 🔓 OPCIONAL: Reverse Proxy da API do Ollama
    # ============================================================
    # location /api/ {
    #     proxy_pass http://127.0.0.1:11434/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # }
}
